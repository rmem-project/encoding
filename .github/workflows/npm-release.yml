name: NPM Release

"on":
  workflow_dispatch:
    inputs:
      mode:
        description: "Preview package contents or publish to npm."
        required: true
        default: "preview"
        type: choice
        options:
          - "preview"
          - "publish"
      version:
        description: "Version already committed in package.json. Must match exactly."
        required: true
        type: string
      npm_tag:
        description: "npm dist-tag for publish mode."
        required: true
        default: "latest"
        type: string

permissions:
  contents: read

concurrency:
  group: "release-${{ inputs.version }}"
  cancel-in-progress: false

env:
  PACKAGE_NAME: "@rmem/encoding"
  RELEASE_MODE: "${{ inputs.mode }}"
  RELEASE_VERSION: "${{ inputs.version }}"
  NPM_TAG: "${{ inputs.npm_tag }}"
  RELEASE_DEFAULT_BRANCH: "${{ github.event.repository.default_branch }}"
  PACKAGE_ARTIFACT_DIR: "release-artifacts"

jobs:
  package-preview:
    name: Package preview
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Run release quality gates
        run: npm run release:check

      - name: Build verified package tarball
        run: npm run release:pack

      - name: Verify package tarball exists
        run: |
          ls -la "$PACKAGE_ARTIFACT_DIR"
          test -n "$(find "$PACKAGE_ARTIFACT_DIR" -maxdepth 1 -name '*.tgz' -print -quit)"

      - name: Upload package preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: "npm-package-${{ inputs.version }}"
          path: "release-artifacts/*.tgz"
          if-no-files-found: "error"
          retention-days: 14

  publish:
    name: Publish package
    if: ${{ inputs.mode == 'publish' }}
    needs: package-preview
    runs-on: ubuntu-latest
    environment: npm-release
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Download package preview artifact
        uses: actions/download-artifact@v4
        with:
          name: "npm-package-${{ inputs.version }}"
          path: "release-artifacts"

      - name: Check publish target availability
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: "v${{ inputs.version }}"
        run: |
          if npm view "$PACKAGE_NAME@$RELEASE_VERSION" version >/dev/null 2>&1; then
            echo "Package version already exists on npm: $PACKAGE_NAME@$RELEASE_VERSION"
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "GitHub release already exists: $TAG_NAME"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
            echo "Git tag already exists: $TAG_NAME"
            exit 1
          fi

      - name: Publish package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm run release:publish

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: "v${{ inputs.version }}"
        run: |
          gh release create "$TAG_NAME" release-artifacts/*.tgz \
            --target "$GITHUB_SHA" \
            --title "@rmem/encoding $RELEASE_VERSION" \
            --notes-file documentation/release-notes-v1.md